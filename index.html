<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSS Control Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            color: #e0e0e0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
            border: 1px solid #2a2a3e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }
        .header h1 { color: #00e5a0; font-size: 24px; }
        .header p { color: #666; margin-top: 5px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: #0f0f1a;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .stat-card:hover { border-color: #00e5a0; }
        .stat-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: bold; color: #00e5a0; }
        .panel {
            background: #0f0f1a;
            border: 1px solid #2a2a3e;
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .panel-header {
            background: #14141f;
            padding: 12px 18px;
            border-bottom: 1px solid #2a2a3e;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-header h2 { font-size: 14px; color: #00e5a0; }
        .panel-body { padding: 18px; }
        .brainrot-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .brainrot-item {
            background: #0a0a0f;
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .brainrot-time { color: #666; font-size: 10px; margin-bottom: 5px; }
        .brainrot-data { color: #00e5a0; word-break: break-all; }
        .btn {
            background: #2a2a3e;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }
        .btn-danger { background: #e74c3c; }
        .btn-success { background: #00e5a0; color: #0a0a0f; }
        pre {
            background: #0a0a0f;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 11px;
        }
        .empty { color: #555; text-align: center; padding: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ WSS CONTROL PANEL</h1>
        <p>Servidor WebSocket - Receptor de Dados JSON</p>
        <p style="color:#00e5a0; margin-top:8px" id="wsUrl">wss://...</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-label">SERVER UPTIME</div>
            <div class="stat-value" id="uptime">0d 0h</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">TOTAL BRAINROTS</div>
            <div class="stat-value" id="total">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">BOTS ONLINE</div>
            <div class="stat-value" id="bots">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">WSS STATUS</div>
            <div class="stat-value" id="wssStatus">🟢 ONLINE</div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h2>📦 BRAINROTS RECEBIDOS</h2>
            <button class="btn btn-danger" onclick="clearBrainrots()">🗑 Limpar</button>
        </div>
        <div class="panel-body">
            <div class="brainrot-list" id="brainrotList">
                <div class="empty">Nenhum brainrot recebido ainda</div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h2>📝 COMO CONECTAR SEU BOT</h2>
        </div>
        <div class="panel-body">
            <pre id="codeExample"></pre>
        </div>
    </div>
</div>

<script>
    let currentUrl = window.location.host;
    document.getElementById('wsUrl').innerHTML = `🔗 wss://${currentUrl}/on`;

    async function loadData() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            document.getElementById('uptime').innerHTML = data.uptime || '0d 0h';
            document.getElementById('total').innerHTML = data.totalBrainrots || 0;
            document.getElementById('bots').innerHTML = data.botsOnline || 0;
            
            const brainrotsRes = await fetch('/api/brainrots');
            const brainrotsData = await brainrotsRes.json();
            const container = document.getElementById('brainrotList');
            if (brainrotsData.data && brainrotsData.data.length > 0) {
                container.innerHTML = brainrotsData.data.map(b => `
                    <div class="brainrot-item">
                        <div class="brainrot-time">📅 ${new Date(b.receivedAt).toLocaleString()}</div>
                        <div class="brainrot-data">${JSON.stringify(b.data, null, 2)}</div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="empty">Nenhum brainrot recebido ainda</div>';
            }
        } catch(e) { console.error(e); }
    }

    async function clearBrainrots() {
        if (!confirm('⚠️ Tem certeza? Isso vai deletar TODOS os brainrots!')) return;
        await fetch('/api/brainrots', { method: 'DELETE' });
        loadData();
    }

    function connectWS() {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${proto}//${location.host}/ws`);
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.event === 'stats' || msg.event === 'brainrot') loadData();
        };
        ws.onclose = () => setTimeout(connectWS, 3000);
    }

    function showCodeExample() {
        const url = `wss://${window.location.host}/on`;
        document.getElementById('codeExample').innerHTML = `# Python
import websocket, json
ws = websocket.WebSocket()
ws.connect("${url}")
ws.send(json.dumps({"bot": "python", "mensagem": "Olá WSS!"}))
print(ws.recv())
ws.close()

# Node.js
const WebSocket = require('ws');
const ws = new WebSocket('${url}');
ws.on('open', () => ws.send(JSON.stringify({bot: 'node', msg: 'teste'})));
ws.on('message', d => console.log(d.toString()));`;
    }

    setInterval(loadData, 3000);
    connectWS();
    loadData();
    showCodeExample();
</script>
</body>
</html>
